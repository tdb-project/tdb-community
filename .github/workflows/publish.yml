name: Publish to GHCR

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/tdb-project/tdb-community
          # Tagging policy (industry convention):
          #   - `latest`, `X.Y.Z`, `X.Y`  ← published only on a `v*` release tag.
          #     `flavor: latest=auto` applies `latest` to stable semver tags and
          #     skips pre-releases (e.g. v1.0.0-rc1), so `latest` always == the
          #     newest stable RELEASE — never the tip of `main`.
          #   - `edge`                     ← published on every push to `main`,
          #     so the bleeding-edge build is available without moving `latest`.
          flavor: |
            latest=auto
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=edge,branch=main

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
