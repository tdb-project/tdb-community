# TDB Community Edition — Docker Compose
#
# Quick start:
#   export TDB_API_KEYS=$(python3 -c "import secrets; print(secrets.token_hex(32))")
#   docker compose up
#
# Then open: http://localhost:8000/docs

services:
  tdb:
    # Pre-built image from GHCR — pulled automatically, no local build needed.
    # To build from source instead (e.g. after local code changes):
    #   comment the image line below and uncomment: build: .
    image: ghcr.io/tdb-project/tdb-community:latest
    # build: .
    container_name: tdb
    restart: unless-stopped
    ports:
      - "${TDB_PORT:-8000}:8000"
    environment:
      # Your API key — change this before exposing to a network
      # Generate one: python3 -c "import secrets; print(secrets.token_hex(32))"
      TDB_API_KEYS: "${TDB_API_KEYS:-dev-insecure-key-change-me}"
      TDB_REGISTRY_DB: /app/data/tdb_registry.db
      TDB_LOG_FILE: /app/logs/tdb_audit.jsonl
      TDB_LOG_LEVEL: "${TDB_LOG_LEVEL:-INFO}"
      # Confine registered CSV paths to the read-only /data mount below.
      TDB_ALLOWED_DATA_DIR: /data
    volumes:
      # Persists the source registry across restarts
      - tdb_data:/app/data
      # Persists audit logs
      - tdb_logs:/app/logs
      # Mount your CSV files here (read-only)
      # Then register with file_path: /data/your_file.csv
      - "${TDB_DATA_DIR:-./data}:/data:ro"
    healthcheck:
      test:
        - "CMD"
        - "python"
        - "-c"
        - "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  tdb_data:
  tdb_logs:
